<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { width:1200px; height:820px; font-family:'Malgun Gothic', system-ui, sans-serif; }
  body { background:#fff; padding:56px 60px; color:#1a1a1a; }
  h1 { font-size:38px; font-weight:800; letter-spacing:-1px; margin-bottom:8px; }
  .sub { font-size:18px; color:#777; margin-bottom:32px; }
  table { width:100%; border-collapse:separate; border-spacing:0; font-size:19px; border-radius:16px; overflow:hidden; box-shadow:0 12px 40px rgba(0,0,0,0.08); }
  th { padding:20px 22px; font-size:20px; font-weight:800; text-align:left; }
  th.f { background:#f4f4f6; color:#555; width:34%; }
  th.a { background:#eef1f5; color:#777; width:33%; }
  th.b { background:#ff5000; color:#fff; width:33%; }
  td { padding:18px 22px; border-bottom:1px solid #eee; }
  td.f { background:#fafafa; font-weight:700; color:#444; }
  td.a { color:#999; }
  td.b { background:#fff7f3; color:#1a1a1a; font-weight:700; }
  tr:last-child td { border-bottom:none; }
  .x { color:#c0392b; font-weight:800; }
  .o { color:#1f8a3b; font-weight:800; }
</style>
</head>
<body>
  <h1>엑셀 템플릿 vs 쿠팡 가계부 확장</h1>
  <div class="sub">쿠팡 지출 정리, 뭐가 더 편할까?</div>
  <table>
    <tr><th class="f">항목</th><th class="a">엑셀 템플릿 (수기)</th><th class="b">쿠팡 가계부 확장</th></tr>
    <tr><td class="f">데이터 입력</td><td class="a">주문 하나하나 직접 타이핑</td><td class="b"><span class="o">버튼 한 번</span>에 자동 추출</td></tr>
    <tr><td class="f">여러 페이지</td><td class="a">페이지마다 반복 복사</td><td class="b"><span class="o">자동 순회</span>로 전체 수집</td></tr>
    <tr><td class="f">쿠키 복사</td><td class="a"><span class="x">필요 (복잡)</span></td><td class="b"><span class="o">불필요</span></td></tr>
    <tr><td class="f">주문번호 합산</td><td class="a">함수 직접 작성</td><td class="b"><span class="o">자동 합산</span> (카드대조용)</td></tr>
    <tr><td class="f">개인정보</td><td class="a">파일로 관리</td><td class="b"><span class="o">내 브라우저에만</span> 저장</td></tr>
    <tr><td class="f">비용</td><td class="a">무료~유료</td><td class="b"><span class="o">무료</span></td></tr>
  </table>
</body>
</html>
